<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luiz Sousa</title>
<link rel="canonical" href="https://luizsousa.com/en/">
<link rel="alternate" hreflang="en" href="https://luizsousa.com/en/">
<link rel="alternate" hreflang="pt-BR" href="https://luizsousa.com/pt-br/">
<link rel="alternate" hreflang="pt-PT" href="https://luizsousa.com/pt-br/">
<link rel="alternate" hreflang="x-default" href="https://luizsousa.com/en/">
<style>body{margin:0;background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,sans-serif;color:#555}</style>
</head>
<body>
<p>Redirecting...</p>
<script>
// Detect browser language and redirect immediately
(function(){
  var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  if(lang.startsWith('pt')){
    window.location.replace('./pt-br/');
  } else {
    window.location.replace('./en/');
  }
})();
</script>
</body>
</html>
