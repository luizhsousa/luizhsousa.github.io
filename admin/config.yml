backend:
  name: github
  repo: luizhsousa/luizhsousa.github.io
  branch: main
  # No base_url needed — sign in with a Personal Access Token (PAT)
  # Simpler and more reliable than OAuth for a solo user

media_folder: assets/images
public_folder: /assets/images
site_url: https://luizsousa.com

collections:

  - name: blog_en
    label: "Blog Posts (English)"
    label_singular: "Blog Post"
    folder: blog/en
    create: true
    slug: "{{fields.slug}}/index"
    extension: html
    format: frontmatter
    editor:
      preview: false
    fields:
      - {label: Title, name: title, widget: string, hint: "Keep under 60 chars for SEO."}
      - {label: Subtitle, name: subtitle, widget: string, hint: "One line below the title."}
      - {label: SEO Description, name: description, widget: text, hint: "120–155 characters."}
      - label: Category
        name: tag
        widget: select
        options: [Career, Marketing, Business, Moving Abroad, Mentoring]
      - {label: Publish Date, name: date, widget: string, hint: "e.g. April 2026"}
      - {label: Read Time (min), name: read_time, widget: number, default: 5, value_type: int}
      - {label: URL Slug, name: slug, widget: string, hint: "e.g. from-kitchen-to-google"}
      - {label: Body, name: body, widget: markdown, modes: [rich_text, raw]}

  - name: blog_ptbr
    label: "Blog Posts (Português)"
    label_singular: "Blog Post"
    folder: blog/pt-br
    create: true
    slug: "{{fields.slug}}/index"
    extension: html
    format: frontmatter
    editor:
      preview: false
    fields:
      - {label: Título, name: title, widget: string, hint: "Máximo 60 caracteres."}
      - {label: Subtítulo, name: subtitle, widget: string, hint: "Uma linha abaixo do título."}
      - {label: Descrição SEO, name: description, widget: text, hint: "120–155 caracteres."}
      - label: Categoria
        name: tag
        widget: select
        options: [Carreira, Marketing, Negócios, Emigrar, Mentoria]
      - {label: Data, name: date, widget: string, hint: "ex. Abril 2026"}
      - {label: Tempo de Leitura (min), name: read_time, widget: number, default: 5, value_type: int}
      - {label: Slug (URL), name: slug, widget: string, hint: "ex. da-cozinha-para-o-google"}
      - {label: Conteúdo, name: body, widget: markdown, modes: [rich_text, raw]}

  - name: settings
    label: "Site Settings"
    files:
      - name: availability
        label: "Availability Toggle"
        file: _data/availability.json
        fields:
          - {label: "Taking on new clients?", name: available, widget: boolean, default: true}
          - {label: "EN — Available message", name: en_available_msg, widget: text}
          - {label: "EN — Waitlist message", name: en_waitlist_msg, widget: text}
          - {label: "PT — Mensagem disponível", name: pt_available_msg, widget: text}
          - {label: "PT — Mensagem lista de espera", name: pt_waitlist_msg, widget: text}
