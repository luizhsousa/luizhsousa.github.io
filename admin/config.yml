backend:
  name: github
  repo: luizhsousa/luizhsousa.github.io
  branch: main

media_folder: assets/images
public_folder: /assets/images
site_url: https://luizsousa.com

collections:

  - name: blog_en
    label: "Blog Posts (English)"
    label_singular: "Blog Post"
    folder: blog/en
    create: true
    extension: html
    format: frontmatter
    editor:
      preview: false
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Subtitle, name: subtitle, widget: string}
      - {label: SEO Description, name: description, widget: text}
      - label: Category
        name: tag
        widget: select
        options: [Career, Marketing, Business, Moving Abroad, Mentoring]
      - {label: Publish Date, name: date, widget: string, hint: "e.g. April 2026"}
      - {label: Read Time (min), name: read_time, widget: number, default: 5, value_type: int}
      - {label: Body, name: body, widget: markdown, modes: [rich_text, raw]}

  - name: blog_ptbr
    label: "Blog Posts (Português)"
    label_singular: "Blog Post"
    folder: blog/pt-br
    create: true
    extension: html
    format: frontmatter
    editor:
      preview: false
    fields:
      - {label: Título, name: title, widget: string}
      - {label: Subtítulo, name: subtitle, widget: string}
      - {label: Descrição SEO, name: description, widget: text}
      - label: Categoria
        name: tag
        widget: select
        options: [Carreira, Marketing, Negócios, Emigrar, Mentoria]
      - {label: Data, name: date, widget: string, hint: "ex. Abril 2026"}
      - {label: Tempo de Leitura (min), name: read_time, widget: number, default: 5, value_type: int}
      - {label: Conteúdo, name: body, widget: markdown, modes: [rich_text, raw]}
